<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ribosomal RNA Viewer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        glassBorder: 'rgba(255, 255, 255, 0.1)',
                        glassBg: 'rgba(28, 28, 30, 0.65)',
                        glassHover: 'rgba(44, 44, 46, 0.75)',
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'Inter', 'SF Pro Text', 'Segoe UI', 'Roboto', 'sans-serif'],
                        mono: ['SF Mono', 'ui-monospace', 'Menlo', 'Monaco', 'monospace']
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts for Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 3Dmol -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.0.4/3Dmol-min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#111111] text-white font-sans h-screen w-screen overflow-hidden selection:bg-blue-500/30 font-medium">

    <!-- 100% Canvas Viewport -->
    <div id="viewer-container" class="absolute inset-0 z-0 w-full h-full bg-[#111111]">
        <div id="gldiv-3dmol" class="w-full h-full outline-none"></div>
    </div>

    <!-- ZERO STATE MODAL (Centered Glassmorphism Modal) -->
    <div id="zeroStateModal" class="absolute inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-lg transition-opacity duration-500">
        <div class="glass-panel w-[400px] p-8 flex flex-col items-center gap-6 rounded-3xl shadow-2xl relative overflow-hidden">
            <!-- decorative ambient glow -->
            <div class="absolute -top-12 -right-12 w-32 h-32 bg-blue-500/20 blur-3xl rounded-full pointer-events-none"></div>
            
            <h1 class="text-2xl font-bold tracking-tight">Data Visualization</h1>
            <p class="text-sm text-white/50 text-center mb-2">Upload your structural files to begin exploration.</p>
            
            <div class="w-full space-y-4 relative z-10">
                <div class="flex flex-col gap-1.5">
                    <span class="text-xs font-semibold text-white/40 uppercase tracking-widest pl-1">Structure</span>
                    <select id="riboSelect" class="w-full appearance-none bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 cursor-pointer backdrop-blur-md outline-none transition-all hover:bg-white/10">
                        <option value="4v6x" class="text-black">Homo sapiens 80S (4v6x)</option>
                    </select>
                </div>

                <div class="flex flex-col gap-1.5">
                    <span class="text-xs font-semibold text-white/40 uppercase tracking-widest pl-1">Modifications</span>
                    <label id="uploadPill" class="flex flex-col items-center justify-center w-full h-28 border border-dashed border-white/20 rounded-xl cursor-pointer bg-white/5 hover:bg-white/10 hover:border-white/30 transition-all relative overflow-hidden group">
                        <div class="absolute inset-0 flex items-center justify-center scale-95 opacity-0 group-hover:scale-100 group-hover:opacity-10 transition-all duration-300">
                            <div class="w-full h-full bg-blue-500 blur-2xl"></div>
                        </div>
                        <div class="flex flex-col items-center justify-center p-4 relative z-10">
                            <svg class="w-7 h-7 mb-2 text-white/60 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                            <span id="fileNameDisplay" class="text-sm font-semibold text-white/80">Upload JSON</span>
                        </div>
                        <input type="file" id="jsonFile" accept=".json" class="hidden">
                    </label>
                </div>

                <button id="loadCifBtn" class="w-full bg-blue-500 hover:bg-blue-400 text-white font-semibold py-3.5 px-4 rounded-xl shadow-lg shadow-blue-500/20 transition-all transform active:scale-95 flex items-center justify-center gap-2 mt-4">
                    Render Workspace
                </button>
            </div>
        </div>
    </div>

    <!-- MAIN UI LAYER (Shows over 3D after loading starts) -->
    <div id="workspaceLayout" class="absolute inset-0 pointer-events-none z-10 w-full h-full p-4">
        
        <!-- TOP CONTROL MODULE -->
        <div id="controlModule" class="control-module">
            <div class="control-panel control-panel-left glass-panel">
                <div class="control-group">
                    <label id="colorModeWrapper" class="control-item group" title="Analytic/Global Mode">
                        <span class="control-label">Analytic</span>
                        <input type="checkbox" id="colorModeToggle" class="hidden peer">
                        <div class="w-10 h-6 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500 relative transition-all"></div>
                        <span id="colorModeLabel" class="control-value">Global</span>
                    </label>

                    <label class="control-item group" title="Toggle Proteins">
                        <span class="control-label">Prots</span>
                        <input type="checkbox" id="toggleProteins" class="hidden peer">
                        <div class="w-10 h-6 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500 relative transition-all"></div>
                    </label>

                    <div class="control-item control-item-opacity group" title="Opacity">
                        <span class="control-label">Opacity</span>
                        <div class="opacity-slider-stack">
                            <input type="range" id="opacitySlider" min="0.1" max="1" step="0.05" value="0.85" class="vertical-auto-slider">
                            <span id="opacityVal" class="control-value">0.85</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="control-panel control-panel-right glass-panel">
                <div class="control-group control-group-actions">
                    <button id="legendMiniBtn" class="control-icon-btn" type="button" title="Show Legend" aria-label="Show legend">i</button>
                    <button id="resetCameraBtn" class="control-icon-btn" title="Reset Camera">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    </button>
                    <button id="snapshotBtn" class="control-icon-btn" title="Take Snapshot">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </button>
                    <button id="sidebarToggleBtn" class="control-icon-btn control-icon-btn-accent" title="Toggle Inspector">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- LEGEND PANEL -->
        <div id="legendPanel" class="legend-panel glass-panel">
            <div class="legend-header">
                <span class="legend-title">Legend</span>
                <button id="legendToggle" class="legend-close-btn" type="button" aria-label="Hide legend">Close</button>
            </div>
            <div id="legendBody" class="legend-body collapsed"></div>
        </div>

        <!-- RIGHT DATA INSPECTOR -->
        <aside id="dataInspector" class="sidebar absolute top-[80px] right-4 bottom-4 w-80 glass-panel rounded-3xl overflow-hidden flex flex-col pointer-events-auto transform transition-transform duration-500 translate-x-0 shadow-2xl z-20">
            <!-- Header -->
            <div class="px-5 py-4 border-b border-white/10 flex items-center justify-between bg-white/5 shrink-0">
                <h2 class="text-sm font-bold tracking-tight">Inspector</h2>
                <div class="bg-blue-500/20 border border-blue-500/30 rounded-full px-3 py-1 flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span>
                    <span id="residueCount" class="text-[10px] font-mono font-bold text-blue-300">0</span>
                </div>
            </div>

            <!-- Toolbar / Searches -->
            <div class="flex flex-col p-4 gap-3 border-b border-white/10 shrink-0">
                <div class="relative w-full">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="searchInput" placeholder="Search residue, mod..." class="w-full bg-black/20 border border-white/10 rounded-xl py-2 pl-9 pr-3 text-xs text-white placeholder-white/30 focus:outline-none focus:border-blue-500/50 transition-all font-mono">
                </div>
                <div class="flex gap-2 w-full">
                    <select id="filterType" class="flex-1 appearance-none bg-black/20 border border-white/10 rounded-lg py-1.5 px-2 text-[10px] uppercase tracking-wider font-semibold text-white/70 focus:outline-none cursor-pointer outline-none">
                        <option value="all" class="text-black">All</option>
                        <option value="28S" class="text-black">28S</option>
                        <option value="18S" class="text-black">18S</option>
                        <option value="5.8S" class="text-black">5.8S</option>
                        <option value="5S" class="text-black">5S</option>
                        <option value="tRNA" class="text-black">tRNA</option>
                    </select>
                    <select id="sortMode" class="flex-1 appearance-none bg-black/20 border border-white/10 rounded-lg py-1.5 px-2 text-[10px] uppercase tracking-wider font-semibold text-white/70 focus:outline-none cursor-pointer outline-none text-right">
                        <option value="resi-asc" class="text-black">Res ↑</option>
                        <option value="resi-desc" class="text-black">Res ↓</option>
                        <option value="chain-asc" class="text-black">Chain</option>
                        <option value="mod-first" class="text-black">Status</option>
                    </select>
                </div>
                
                <div class="flex items-center justify-between mt-1 px-1">
                    <span class="text-[10px] text-white/40 font-medium" id="actionHint">Click a card to navigate</span>
                    <div class="flex items-center gap-2">
                        <span id="labelCount" class="text-[9px] font-mono bg-white/10 px-1.5 py-0.5 rounded text-white/60">0</span>
                        <button id="clearLabelsBtn" class="text-[9px] uppercase font-bold text-red-400 hover:text-red-300 transition-colors tracking-wider">Clear</button>
                    </div>
                </div>
            </div>

            <!-- Mod List (Cards based) -->
            <ul id="modList" class="custom-scrollbar">
                <!-- Data populated dynamically via JS -->
            </ul>
        </aside>

    </div>

    <!-- Context Menu -->
    <div id="residueContextMenu" class="fixed z-50 glass-panel rounded-xl flex flex-col overflow-hidden py-1 w-36 shadow-2xl scale-95 opacity-0 pointer-events-none transition-all transform origin-top-left" aria-hidden="true">
        <button id="menuInsertLabelBtn" type="button" class="px-4 py-2 text-xs font-semibold text-left hover:bg-white/10 hover:text-blue-400 transition-colors w-full">Label</button>
        <div class="h-px bg-white/10 my-0.5 mx-2"></div>
        <button id="menuStartMeasureBtn" type="button" class="px-4 py-2 text-xs font-semibold text-left hover:bg-white/10 hover:text-blue-400 transition-colors w-full">Measure</button>
    </div>

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" class="absolute inset-0 z-[100] bg-black/60 backdrop-blur-md hidden items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="glass-panel p-6 rounded-3xl flex flex-col items-center gap-4 w-64 shadow-2xl relative overflow-hidden">
            <div class="w-8 h-8 border-2 border-white/10 border-t-blue-500 rounded-full animate-spin"></div>
            <span id="loadingMsg" class="text-xs font-semibold text-white/70 tracking-widest uppercase">Rendering...</span>
            <div class="w-full h-1 bg-white/10 rounded-full overflow-hidden mt-1">
                <div id="progressBar" class="h-full bg-blue-500 rounded-full w-0 transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script type="module" src="app.js"></script>

    <!-- INLINE LOGIC FOR UI MODAL -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('zeroStateModal');
            const loadBtn = document.getElementById('loadCifBtn');
            const inspector = document.getElementById('dataInspector');
            const inspectorToggle = document.getElementById('sidebarToggleBtn');

            // Detect app load transition
            const observer = new MutationObserver(() => {
                if (!loadBtn.classList.contains('is-working')) {
                    // Assume loading is complete
                    setTimeout(() => {
                        modal.style.opacity = '0';
                        modal.style.pointerEvents = 'none';
                    }, 500);
                }
            });
            observer.observe(loadBtn, { attributes: true, attributeFilter: ['class'] });

            // Inspector Toggle
            inspectorToggle.addEventListener('click', () => {
                if (inspector.classList.contains('translate-x-[400px]')) {
                    inspector.classList.remove('translate-x-[400px]');
                    inspector.classList.add('translate-x-0');
                    inspectorToggle.classList.add('bg-blue-500/20');
                    inspectorToggle.classList.remove('bg-white/5');
                } else {
                    inspector.classList.remove('translate-x-0');
                    inspector.classList.add('translate-x-[400px]');
                    inspectorToggle.classList.remove('bg-blue-500/20');
                    inspectorToggle.classList.add('bg-white/5');
                }
            });
        });
    </script>
</body>
</html>
