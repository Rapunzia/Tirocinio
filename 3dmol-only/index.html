<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ribosomal RNA Viewer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        glassBorder: 'rgba(255, 255, 255, 0.1)',
                        glassBg: 'rgba(28, 28, 30, 0.65)',
                        glassHover: 'rgba(44, 44, 46, 0.75)',
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'Inter', 'SF Pro Text', 'Segoe UI', 'Roboto', 'sans-serif'],
                        mono: ['SF Mono', 'ui-monospace', 'Menlo', 'Monaco', 'monospace']
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts for Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    
    <!-- 3Dmol -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.0.4/3Dmol-min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#111111] text-white font-sans h-screen w-screen overflow-hidden selection:bg-blue-500/30 font-medium">

    <!-- 100% Canvas Viewport -->
    <div id="viewer-container" class="absolute inset-0 z-0 w-full h-full bg-[#111111]">
        <div id="gldiv-3dmol" class="w-full h-full outline-none"></div>
    </div>

    <!-- ZERO STATE MODAL (Centered Glassmorphism Modal) -->
    <div id="zeroStateModal" class="absolute inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-lg transition-opacity duration-500">
        <div class="glass-panel w-[400px] p-8 flex flex-col items-center gap-6 rounded-3xl shadow-2xl relative overflow-hidden">
            <button id="closeLoadOverlayBtn" class="overlay-close-btn" type="button" aria-label="Close loader">&times;</button>
            <!-- decorative ambient glow -->
            <div class="absolute -top-12 -right-12 w-32 h-32 bg-blue-500/20 blur-3xl rounded-full pointer-events-none"></div>
            
            <h1 class="text-2xl font-bold tracking-tight">Data Visualization</h1>
            <p class="text-sm text-white/50 text-center mb-2">Upload your structural files to begin exploration.</p>

            <div id="uploadModeToggle" class="segmented-control" data-active="resume" role="tablist" aria-label="Session mode">
                <span class="segmented-thumb" aria-hidden="true"></span>
                <button class="segmented-option is-active" type="button" data-mode="resume" role="tab" aria-selected="true">Resume Session</button>
                <button class="segmented-option" type="button" data-mode="new" role="tab" aria-selected="false">New Session</button>
            </div>
            
            <div class="w-full relative z-10">
                <div class="mode-panels">
                    <div id="resumePanel" class="mode-panel is-active" role="tabpanel">
                        <div class="dropzone" id="sessionDropzone" data-mode="resume">
                            <input type="file" id="sessionFileInput" accept=".json" class="hidden">
                            <div class="dropzone-body">
                                <i class="fa-solid fa-file-lines dropzone-icon" aria-hidden="true"></i>
                                <span class="dropzone-text">Drag and drop your JSON session file</span>
                            </div>
                            <div class="chip-row" id="sessionChips"></div>
                        </div>
                    </div>

                    <div id="newPanel" class="mode-panel" role="tabpanel">
                        <div class="flex flex-col gap-1.5">
                            <span class="text-xs font-semibold text-white/40 uppercase tracking-widest pl-1">Structure</span>
                            <select id="riboSelect" class="w-full appearance-none bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 cursor-pointer backdrop-blur-md outline-none transition-all hover:bg-white/10">
                                <option value="4v6x" class="text-black">Homo sapiens 80S (4v6x)</option>
                            </select>
                        </div>

                        <div class="dropzone mt-4" id="newDropzone" data-mode="new">
                            <input type="file" id="newFilesInput" accept=".fasta,.csv" class="hidden" multiple>
                            <div class="dropzone-body">
                                <i class="fa-solid fa-cloud-arrow-up dropzone-icon" aria-hidden="true"></i>
                                <span class="dropzone-text">Drag and drop your FASTA and CSV files</span>
                            </div>
                            <div class="chip-row" id="newChips"></div>
                        </div>
                    </div>
                </div>

                <button id="loadCifBtn" class="w-full bg-blue-500 hover:bg-blue-400 text-white font-semibold py-3.5 px-4 rounded-xl shadow-lg shadow-blue-500/20 transition-all transform active:scale-95 flex items-center justify-center gap-2 mt-4" disabled>
                    Render Workspace
                </button>
            </div>
        </div>
    </div>

    <!-- MAIN UI LAYER (Shows over 3D after loading starts) -->
    <div id="workspaceLayout" class="absolute inset-0 pointer-events-none z-10 w-full h-full p-4">

        <!-- LEFT ICON SIDEBAR -->
        <nav id="leftSidebar" class="left-sidebar glass-panel" aria-label="Primary">
            <button id="openLoadOverlayBtn" class="sidebar-icon-btn" type="button" title="Open loader" aria-label="Open loader">
                <i class="fa-solid fa-house" aria-hidden="true"></i>
            </button>
            <div class="sidebar-divider"></div>
            <button id="resetCameraSidebarBtn" class="sidebar-icon-btn" type="button" title="Reset camera" aria-label="Reset camera">
                <i class="fa-solid fa-crosshairs" aria-hidden="true"></i>
            </button>
            <button class="sidebar-icon-btn" type="button" data-panel-target="style" title="Style" aria-label="Style">
                <i class="fa-solid fa-palette" aria-hidden="true"></i>
            </button>
            <button class="sidebar-icon-btn" type="button" data-panel-target="export" title="Export" aria-label="Export">
                <i class="fa-solid fa-floppy-disk" aria-hidden="true"></i>
            </button>
        </nav>

        <!-- FLOATING PANELS -->
        <section id="stylePanel" class="floating-panel" aria-hidden="true">
            <div class="floating-panel-header">
                <span>Style</span>
                <button class="panel-close-btn" type="button" data-panel-close aria-label="Close">&times;</button>
            </div>
            <div class="floating-panel-body">
                <label class="panel-toggle">
                    <span>Database Overlay</span>
                    <input type="checkbox" id="toggleDatabaseOverlay" class="hidden peer">
                    <div class="panel-switch"></div>
                </label>
                <label class="panel-toggle">
                    <span>Isolate Unknown</span>
                    <input type="checkbox" id="toggleIsolateUnknown" class="hidden peer">
                    <div class="panel-switch"></div>
                </label>
                <label class="panel-toggle">
                    <span>Isolate Custom</span>
                    <input type="checkbox" id="toggleIsolateCustom" class="hidden peer">
                    <div class="panel-switch"></div>
                </label>
                <div class="panel-slider">
                    <div class="panel-slider-row">
                        <span>Global opacity</span>
                        <span id="opacityVal" class="panel-value">0.70</span>
                    </div>
                    <input type="range" id="opacitySlider" min="0.1" max="1" step="0.05" value="0.7">
                </div>
                <label class="panel-toggle">
                    <span>Structural Proteins</span>
                    <input type="checkbox" id="toggleProteins" class="hidden peer">
                    <div class="panel-switch"></div>
                </label>
            </div>

        </section>

        <section id="exportPanel" class="floating-panel" aria-hidden="true">
            <div class="floating-panel-header">
                <span>Export</span>
                <button class="panel-close-btn" type="button" data-panel-close aria-label="Close">&times;</button>
            </div>
            <div class="floating-panel-body">
                <button id="saveSessionBtn" class="panel-action-btn" type="button">
                    <span>Save session (.json)</span>
                    <i class="fa-solid fa-floppy-disk" aria-hidden="true"></i>
                </button>
                <button id="snapshotBtn" class="panel-action-btn" type="button">
                    <span>Snapshot (.png)</span>
                    <i class="fa-solid fa-camera-retro" aria-hidden="true"></i>
                </button>
                <button id="pymolExportBtn" class="panel-action-btn" type="button">
                    <span>PyMOL script (.pml)</span>
                    <i class="fa-solid fa-file-code" aria-hidden="true"></i>
                </button>
            </div>
        </section>

        <!-- LEGEND PANEL -->

        <!-- RIGHT DATA INSPECTOR -->
        <aside id="dataInspector" class="sidebar absolute top-[20px] right-4 bottom-4 glass-panel rounded-3xl overflow-hidden flex flex-col pointer-events-auto transform transition-transform duration-500 translate-x-0 shadow-2xl z-20">
            <button id="inspectorEar" class="inspector-ear" type="button" title="Toggle inspector" aria-label="Toggle inspector">
                <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
            </button>
            <div class="inspector-shell">
                <!-- Header -->
                <div class="px-5 py-4 border-b border-white/10 flex items-center justify-between bg-white/5 shrink-0">
                    <h2 class="text-sm font-bold tracking-tight">Inspector</h2>
                    <div class="bg-black/20 border border-white/10 rounded-lg px-2.5 py-1 flex items-center gap-2" title="Total visible residues">
                        <span class="text-[9px] font-bold uppercase tracking-widest text-white/40">Residues</span>
                        <span id="residueCount" class="text-xs font-mono font-bold text-white/80">0</span>
                    </div>
                </div>

                <!-- Toolbar / Searches -->
                <div class="flex flex-col p-4 gap-3 border-b border-white/10 shrink-0">
                    <div class="relative w-full">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" id="searchInput" placeholder="Search residue, mod..." class="w-full bg-black/20 border border-white/10 rounded-xl py-2 pl-9 pr-3 text-xs text-white placeholder-white/30 focus:outline-none focus:border-blue-500/50 transition-all font-mono">
                    </div>
                    <div class="flex gap-2 w-full">
                        <select id="filterType" class="flex-1 appearance-none bg-black/20 border border-white/10 rounded-lg py-1.5 px-2 text-[10px] uppercase tracking-wider font-semibold text-white/70 focus:outline-none cursor-pointer outline-none">
                            <option value="all" class="text-black">All</option>
                            <option value="28S" class="text-black">28S</option>
                            <option value="18S" class="text-black">18S</option>
                            <option value="5.8S" class="text-black">5.8S</option>
                            <option value="5S" class="text-black">5S</option>
                            <option value="tRNA" class="text-black">tRNA</option>
                        </select>
                        <select id="sortMode" class="flex-1 appearance-none bg-black/20 border border-white/10 rounded-lg py-1.5 px-2 text-[10px] uppercase tracking-wider font-semibold text-white/70 focus:outline-none cursor-pointer outline-none">
                            <option value="mod-first" class="text-black" selected>Sort by: Status</option>
                            <option value="resi-asc" class="text-black">Sort by: Res ↑</option>
                            <option value="resi-desc" class="text-black">Sort by: Res ↓</option>
                            <option value="chain-asc" class="text-black">Sort by: Chain</option>
                        </select>
                    </div>
                    
                    <div class="flex items-center justify-between mt-1 px-1">
                        <span class="text-[9px] text-white/40 font-medium leading-relaxed" id="actionHint">
                            Left click on residue: zoom<br>
                            Right click: actions menu
                        </span>
                        <div class="flex items-center gap-2">
                            <span id="labelCount" class="text-[9px] font-mono bg-white/10 px-1.5 py-0.5 rounded text-white/60">0</span>
                            <button id="clearLabelsBtn" class="text-[9px] uppercase font-bold text-red-400 hover:text-red-300 transition-colors tracking-wider">Clear All</button>
                        </div>
                    </div>
                </div>

                <!-- Mod List (Cards based) -->
                <ul id="modList" class="custom-scrollbar">
                    <!-- Data populated dynamically via JS -->
                </ul>
            </div>
        </aside>

        <button id="helpBtn" class="help-fab glass-panel" type="button" aria-label="Help">
            <i class="fa-solid fa-question help-fab-icon" aria-hidden="true"></i>
            <div class="help-fab-header">
                <span class="help-fab-title">Legend</span>
            </div>
            <div id="legendBody" class="legend-body collapsed"></div>
        </button>

    </div>

    <!-- Context Menu -->
    <div id="residueContextMenu" class="fixed z-50 glass-panel rounded-[var(--radius)] flex flex-col overflow-hidden p-2 w-52 shadow-2xl scale-95 opacity-0 pointer-events-none transition-all transform origin-top-left gap-1" aria-hidden="true">
        
        <!-- Color Palette -->
        <div class="flex items-center justify-between gap-1 pb-2 border-b border-white/10">
            <button class="w-5 h-5 rounded-full bg-gray-500 hover:scale-110 transition-all flex items-center justify-center text-[9px] font-bold text-white relative" data-action="color" data-color="auto" title="Automatic">A</button>
            <button class="w-5 h-5 rounded-full hover:scale-110 transition-all relative" style="background-color: #ef4444;" data-action="color" data-color="#ef4444" title="Red"></button>
            <button class="w-5 h-5 rounded-full hover:scale-110 transition-all relative" style="background-color: #22c55e;" data-action="color" data-color="#22c55e" title="Green"></button>
            <button class="w-5 h-5 rounded-full hover:scale-110 transition-all relative" style="background-color: #3b82f6;" data-action="color" data-color="#3b82f6" title="Blue"></button>
            <button class="w-5 h-5 rounded-full hover:scale-110 transition-all relative" style="background-color: #eab308;" data-action="color" data-color="#eab308" title="Yellow"></button>
            <button class="w-5 h-5 rounded-full hover:scale-110 transition-all relative" style="background-color: #a855f7;" data-action="color" data-color="#a855f7" title="Purple"></button>
        </div>

        <div class="flex flex-col py-1 gap-0.5">
            <button id="menuInsertLabelBtn" type="button" class="px-2 py-1.5 rounded-md text-xs font-semibold text-left hover:bg-white/10 hover:text-blue-400 transition-colors w-full flex justify-between items-center group">
                <span>Label</span>
                <i id="menuLabelActiveIcon" class="fa-solid fa-check text-blue-400 opacity-0 transition-opacity"></i>
            </button>
            <button id="menuStartMeasureBtn" type="button" class="px-2 py-1.5 rounded-md text-xs font-semibold text-left hover:bg-white/10 hover:text-blue-400 transition-colors w-full flex justify-between items-center">
                <span>Measure</span>
            </button>
            
            <div class="h-px bg-white/10 my-1 mx-1"></div>
            
            <div class="px-2 py-1 text-[10px] font-bold text-white/40 uppercase tracking-wider">Style</div>
            <button type="button" class="px-2 py-1.5 rounded-md text-xs font-medium text-left hover:bg-white/10 transition-colors w-full flex justify-between items-center" data-action="style" data-style="sphere">
                <span>Spheres</span>
                <i class="fa-solid fa-check text-blue-400 opacity-0 transition-opacity" data-style-check="sphere"></i>
            </button>
            <button type="button" class="px-2 py-1.5 rounded-md text-xs font-medium text-left hover:bg-white/10 transition-colors w-full flex justify-between items-center" data-action="style" data-style="stick">
                <span>Sticks</span>
                <i class="fa-solid fa-check text-blue-400 opacity-0 transition-opacity" data-style-check="stick"></i>
            </button>
            <button type="button" class="px-2 py-1.5 rounded-md text-xs font-medium text-left hover:bg-white/10 transition-colors w-full flex justify-between items-center" data-action="style" data-style="cartoon">
                <span>Cartoon</span>
                <i class="fa-solid fa-check text-blue-400 opacity-0 transition-opacity" data-style-check="cartoon"></i>
            </button>
        </div>
        
        <!-- Notes Section -->
        <div class="flex flex-col gap-1 border-t border-white/10 pt-2 mt-1 px-1">
            <div class="text-[10px] font-bold text-white/40 uppercase tracking-wider px-1">Notes</div>
            <textarea id="menuNoteInput" class="w-full bg-black/20 border border-white/10 rounded-md p-1.5 text-xs text-white/80 resize-none outline-none focus:border-blue-500/50 transition-colors custom-scrollbar" rows="3" placeholder="Add a note..."></textarea>
        </div>
    </div>

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" class="absolute inset-0 z-[100] bg-black/60 backdrop-blur-md hidden items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="glass-panel p-6 rounded-3xl flex flex-col items-center gap-4 w-64 shadow-2xl relative overflow-hidden">
            <div class="w-8 h-8 border-2 border-white/10 border-t-blue-500 rounded-full animate-spin"></div>
            <span id="loadingMsg" class="text-xs font-semibold text-white/70 tracking-widest uppercase">Rendering...</span>
            <div class="w-full h-1 bg-white/10 rounded-full overflow-hidden mt-1">
                <div id="progressBar" class="h-full bg-blue-500 rounded-full w-0 transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script type="module" src="app.js"></script>

</body>
</html>
