<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifications Map</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.0.4/3Dmol-min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/pdbe-molstar@3.2.0/build/pdbe-molstar-light-plugin.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pdbe-molstar@3.2.0/build/pdbe-molstar-plugin.js"></script>
    <script type="text/javascript" src="https://chemapps.stolaf.edu/jmol/jsmol/JSmol.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ngl@2.3.0/dist/ngl.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
    <nav class="topbar-controls">
        <div class="ctrl-pill engine-pill">
            <span class="ctrl-label">Engine</span>
            <select id="engineSelect">
                <option value="3dmol">3Dmol.js</option>
                <option value="molstar">Mol*</option>
                <option value="jsmol">JSmol</option>
                <option value="ngl">NGL</option>
            </select>
        </div>

        <div class="ctrl-pill">
            <span class="ctrl-label">Structure</span>
            <select id="riboSelect">
                <option value="4v6x">Homo sapiens 80S (4v6x)</option>
            </select>
            <button id="loadCifBtn" class="btn-load">
                <span class="btn-icon">⬡</span> Load
            </button>
        </div>

        <div class="ctrl-pill upload-pill" id="uploadPill">
            <span class="ctrl-label">JSON</span>
            <label class="file-label" for="jsonFile">
                <span id="fileNameDisplay">Choose file…</span>
                <input type="file" id="jsonFile" accept=".json">
            </label>
        </div>

        <div class="ctrl-pill" id="ui-opacity">
            <span class="ctrl-label">Opacity</span>
            <div class="slider-wrap">
                <input type="range" id="opacitySlider" min="0" max="1" step="0.05" value="0.3">
                <span id="opacityVal">0.3</span>
            </div>
        </div>

        <div class="ctrl-pill toggle-pill">
            <label class="toggle-switch">
                <input type="checkbox" id="toggleUnknown" checked>
                <span class="toggle-track">
                    <span class="toggle-thumb"></span>
                </span>
            </label>
            <span class="ctrl-label">Unknown</span>
        </div>

        <div class="ctrl-pill toggle-pill" title="Show/Hide structural proteins">
            <label class="toggle-switch">
                <input type="checkbox" id="toggleProteins">
                <span class="toggle-track">
                    <span class="toggle-thumb"></span>
                </span>
            </label>
            <span class="ctrl-label">Proteins</span>
        </div>

        <div class="ctrl-pill toggle-pill" title="Show/Hide text labels (3Dmol only)">
            <label class="toggle-switch">
                <input type="checkbox" id="toggleLabels">
                <span class="toggle-track">
                    <span class="toggle-thumb"></span>
                </span>
            </label>
            <span class="ctrl-label">Labels</span>
        </div>

        <button id="snapshotBtn" class="btn-load" style="margin-left: auto;" title="Take a snapshot of the current view">
            PNG export
        </button>
    </nav>
</header>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
        <div class="spinner"></div>
        <span id="loadingMsg">Loading structure…</span>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    </div>
</div>

<div class="workspace">

    <div id="viewer-container">

        <div class="legend-panel" id="legendPanel">
            <button class="legend-toggle" id="legendToggle" title="Toggle legend">LEGEND ▲</button>
            <div class="legend-body" id="legendBody">
                <div class="legend-section-title">RNA Backbones</div>
                <div class="legend-row"><span class="lswatch" style="--c:#555555"></span>28S rRNA</div>
                <div class="legend-row"><span class="lswatch" style="--c:#E6E6E6; border:1px solid #bbb"></span>18S rRNA</div>
                <div class="legend-row"><span class="lswatch" style="--c:#FFD700"></span>5.8S rRNA</div>
                <div class="legend-row"><span class="lswatch" style="--c:#4169E1"></span>5S rRNA</div>
                <div class="legend-row"><span class="lswatch" style="--c:#90EE90"></span>tRNA</div>
                <div class="legend-section-title">Modifications</div>
                <div class="legend-row"><span class="lswatch" style="--c:#00E676"></span>Ψ (Domain I)</div>
                <div class="legend-row"><span class="lswatch" style="--c:#2979FF"></span>Ribose (R)</div>
                <div class="legend-row"><span class="lswatch" style="--c:#FF1744"></span>Base (B)</div>
                <div class="legend-row"><span class="lswatch" style="--c:#D500F9"></span>Base+Ribose</div>
                <div class="legend-row"><span class="lswatch" style="--c:#00E5FF"></span>Ψ+Ribose</div>
                <div class="legend-row"><span class="lswatch" style="--c:#FF9100"></span>Complex (ac, D)</div>
                <div class="legend-row"><span class="lswatch" style="--c:#111111; border:1px solid #bbb"></span>Hyper-Variable</div>
                <div class="legend-row"><span class="lswatch" style="--c:#FFEA00; border:1px solid #bbb"></span>Unknown</div>
            </div>
        </div>

        <div id="gldiv-3dmol"  class="viewer-layer active-engine"></div>
        <div id="gldiv-molstar" class="viewer-layer hidden-engine"></div>
        <div id="gldiv-jsmol"  class="viewer-layer hidden-engine"></div>
        <div id="gldiv-ngl"   class="viewer-layer hidden-engine"></div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Modified Residues</h2>
            <span class="residue-count" id="residueCount">—</span>
        </div>

        <div class="sidebar-search">
            <input type="text" id="searchInput" placeholder="Search residue, mod…" autocomplete="off">
            <select id="filterType">
                <option value="all">All types</option>
                <option value="28S">28S</option>
                <option value="18S">18S</option>
                <option value="5.8S">5.8S</option>
                <option value="5S">5S</option>
                <option value="tRNA">tRNA</option>
            </select>
        </div>

        <ul id="modList">
            <li class="empty-msg">Load files to see residues…</li>
        </ul>
    </aside>
</div>

<script src="app.js"></script>
</body>
</html>
